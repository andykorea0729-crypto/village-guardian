<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리 마을 수호대 · 2학년 3반</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic','맑은 고딕',sans-serif; }
  body { background: linear-gradient(180deg,#a7e6ff 0%,#fcf6c8 100%); }

  /* 16:9 무대 — 화면에 자동으로 맞춰 스케일 */
  #stage {
    position: absolute; left: 50%; top: 50%;
    width: 1600px; height: 900px;
    transform: translate(-50%,-50%);
    transform-origin: center center;
    background: transparent;
  }

  /* ---------- 시작화면 ---------- */
  #start-screen {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 35%, #fffae0 0%, #ffd4a3 60%, #c0e8ff 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #start-screen .gate {
    position: absolute; top: 60px;
    font-size: 64px; font-weight: 900; color: #3a2a1a;
    text-shadow: 4px 4px 0 #ffe0a0, -2px -2px 0 #fff;
    letter-spacing: 2px;
  }
  #start-screen .subtitle { font-size: 22px; color: #7a5a3a; margin-top: 8px; }
  #start-screen .teacher-tag {
    position: absolute; top: 24px; right: 32px;
    background: #fff; padding: 10px 18px; border-radius: 30px;
    border: 3px solid #ff8a3d; font-weight: 800; color: #d44a00;
    box-shadow: 4px 4px 0 #ff8a3d;
  }
  #start-screen .panel {
    background: rgba(255,255,255,0.95);
    border: 5px solid #ff8a3d; border-radius: 24px;
    padding: 36px 48px; margin-top: 240px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    min-width: 580px;
  }
  #start-screen label { display:block; font-size: 20px; font-weight: 700; color: #444; margin: 14px 0 6px; }
  #start-screen input {
    width: 100%; padding: 14px 16px; font-size: 22px;
    border: 3px solid #ffb56b; border-radius: 12px;
    background: #fff8ec; outline: none;
  }
  #start-screen input:focus { border-color: #ff6a00; }
  #start-screen .row { display: flex; gap: 14px; }
  #start-screen .row > div { flex: 1; }
  #start-btn {
    margin-top: 26px; width: 100%;
    padding: 18px; font-size: 26px; font-weight: 900;
    background: #cccccc; color: #fff; border: none; border-radius: 16px;
    cursor: not-allowed; transition: all .2s;
  }
  #start-btn.ready {
    background: linear-gradient(180deg,#ffb24d 0%, #ff7a1f 100%);
    cursor: pointer; box-shadow: 0 6px 0 #c0500e;
  }
  #start-btn.ready:hover { transform: translateY(2px); box-shadow: 0 4px 0 #c0500e; }

  /* 시작화면 장식 - 마을 입구 */
  .gate-deco { position: absolute; pointer-events: none; }
  .gate-tree { bottom: 0; font-size: 180px; line-height: 1; }
  .gate-tree.l { left: 40px; }
  .gate-tree.r { right: 40px; transform: scaleX(-1); }
  .gate-cloud { position: absolute; font-size: 70px; opacity: 0.85; animation: float 6s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateX(0); } 50% { transform: translateX(30px); } }

  /* ---------- 플레이 화면 ---------- */
  #play-screen { position: absolute; inset: 0; display: none; }
  #play-screen.active { display: block; }

  /* 상단 HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; height: 70px;
    background: linear-gradient(180deg,#fff7e0 0%, #ffe1a8 100%);
    border-bottom: 4px solid #c98a3a;
    display: flex; align-items: center; padding: 0 20px; gap: 18px;
    z-index: 20;
  }
  .hud-chip {
    background: #fff; border: 3px solid #c98a3a; border-radius: 30px;
    padding: 8px 18px; font-weight: 800; font-size: 18px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 3px 3px 0 #c98a3a;
  }
  .hud-chip .big { font-size: 24px; color: #d44a00; }
  #date-chip { background: #d6f3ff; }
  #season-chip .season-icon { font-size: 22px; }
  #happy-chip { background: #ffd6e8; }
  #turn-chip { background: #e8ffd6; }
  #player-turn-chip {
    background: linear-gradient(90deg,#ffe07a,#ffb84d);
    border-color: #d44a00; color: #5a2a00;
  }
  #help-btn, #mailbox-btn {
    margin-left: auto;
    background: #fff; border: 3px solid #c98a3a; border-radius: 50%;
    width: 50px; height: 50px; font-size: 26px; cursor: pointer;
    box-shadow: 3px 3px 0 #c98a3a;
    display: flex; align-items: center; justify-content: center;
  }
  #mailbox-btn { margin-left: 8px; position: relative; }
  #mailbox-badge {
    position: absolute; top: -5px; right: -5px;
    background: #ff3a3a; color: #fff; font-size: 12px; font-weight: 800;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  .teacher-mini {
    position: absolute; top: 78px; left: 20px;
    background: rgba(255,255,255,0.9); padding: 4px 10px;
    border-radius: 12px; font-size: 12px; color: #666; font-weight: 700;
    z-index: 19;
  }

  /* 좌/우 건물 패널 */
  .building-panel {
    position: absolute; top: 80px; bottom: 70px;
    width: 230px; overflow-y: auto;
    background: rgba(255,255,255,0.92);
    border: 4px solid #8a5a2a; padding: 10px;
    z-index: 15;
  }
  #left-panel { left: 10px; border-radius: 0 20px 20px 0; }
  #right-panel { right: 10px; border-radius: 20px 0 0 20px; }
  .panel-title { font-size: 16px; font-weight: 800; color: #5a3a1a; margin: 4px 0 6px; padding-left: 4px; }
  .cat-group { margin-bottom: 10px; }
  .cat-header {
    background: #ffd47a; padding: 4px 8px; border-radius: 8px;
    font-weight: 800; font-size: 13px; color: #5a3a1a; margin-bottom: 4px;
  }
  .building-item {
    display: flex; align-items: center; gap: 8px;
    background: #fff8e8; border: 2px solid #c98a3a;
    border-radius: 10px; padding: 6px 8px; margin-bottom: 4px;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .building-item:hover { background: #ffe9b8; transform: translateX(3px); }
  .building-item.disabled { opacity: 0.5; cursor: not-allowed; }
  .building-item .icon { font-size: 28px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
  .building-item .name { font-size: 12px; font-weight: 700; color: #3a2a1a; line-height: 1.2; }

  /* 마을 영역 */
  #village {
    position: absolute; left: 250px; right: 250px;
    top: 80px; bottom: 70px;
    overflow: hidden;
  }
  #village-canvas { position: absolute; inset: 0; }
  #character-layer { position: absolute; inset: 0; pointer-events: none; }
  #effect-layer { position: absolute; inset: 0; pointer-events: none; }
  #drag-preview { position: absolute; pointer-events: none; font-size: 60px; z-index: 50; display:none; filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.4));}

  /* 캐릭터 */
  .npc {
    position: absolute; width: 38px; height: 52px;
    pointer-events: auto; cursor: pointer;
    transition: left .1s linear, top .1s linear;
    z-index: 5;
  }
  .npc .body { font-size: 36px; display: block; line-height: 1; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
  .npc .label {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    background: #fff; border: 2px solid #555; border-radius: 8px;
    padding: 1px 6px; font-size: 11px; font-weight: 800; white-space: nowrap;
    color: #333;
  }
  .npc.boy .label { border-color: #3a8aff; color: #1a4aaf; }
  .npc.girl .label { border-color: #ff6aa6; color: #c33070; }
  .npc.walking { animation: walk .4s ease-in-out infinite alternate; }
  .npc.running { animation: walk .2s ease-in-out infinite alternate; }
  @keyframes walk { from { transform: translateY(0); } to { transform: translateY(-3px); } }

  .speech {
    position: absolute; left: 50%; bottom: 55px; transform: translateX(-50%);
    background: #fff; border: 3px solid #444; border-radius: 14px;
    padding: 6px 10px; font-size: 12px; font-weight: 700; color: #222;
    white-space: nowrap; min-width: 60px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    z-index: 10;
  }
  .speech::after {
    content:''; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #444;
  }

  /* 건물 (캔버스에 그릴 수도, DOM 이모지로도) */
  .building-sprite {
    position: absolute; transform: translate(-50%,-60%);
    font-size: 54px; line-height: 1; pointer-events: auto; cursor: pointer;
    filter: drop-shadow(3px 5px 0 rgba(0,0,0,0.35));
    transition: transform .15s;
    z-index: 3;
  }
  .building-sprite:hover { transform: translate(-50%,-65%) scale(1.1); }
  .building-sprite.constructing { animation: shake .25s ease-in-out infinite; }
  @keyframes shake { 0%,100% { transform: translate(-50%,-60%) rotate(-2deg); } 50% { transform: translate(-50%,-60%) rotate(2deg); } }
  .construction-sign {
    position: absolute; transform: translate(-50%,-50%);
    font-size: 38px; z-index: 4;
    animation: pop .6s ease-in-out infinite alternate;
  }
  @keyframes pop { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.15); } }

  .sos-flag {
    position: absolute; transform: translate(-50%,-130%);
    font-size: 36px; font-weight: 900; color: #ff1a1a;
    background: #fff; border: 3px solid #ff1a1a; border-radius: 8px;
    padding: 2px 8px; z-index: 8;
    animation: wave 0.5s ease-in-out infinite alternate;
  }
  @keyframes wave { from { transform: translate(-50%,-130%) rotate(-5deg);} to {transform: translate(-50%,-130%) rotate(5deg);} }

  /* 행복 나무 (캔버스 외 DOM 오버레이) */
  .happy-tree {
    position: absolute; transform: translate(-50%,-60%);
    font-size: 46px; z-index: 2;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
  }
  .happy-tree .heart-fruit {
    position: absolute; font-size: 18px;
    animation: heartbeat 2s ease-in-out infinite;
  }
  @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .heart-burst {
    position: absolute; font-size: 28px; pointer-events: none;
    animation: burst 1s ease-out forwards;
  }
  @keyframes burst {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2.5) translateY(-40px); opacity: 0; }
  }

  /* 우체통 */
  #mailbox {
    position: absolute; right: 260px; top: 90px;
    font-size: 50px; cursor: pointer; z-index: 16;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.3));
    transition: transform .2s;
  }
  #mailbox:hover { transform: scale(1.15) rotate(-5deg); }
  #mailbox.has-mail { animation: mailbob 1s ease-in-out infinite; }
  @keyframes mailbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* 하단 푸터 */
  #footer-msg {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(180deg,#5a3a1a,#3a2a1a);
    color: #ffe080; font-weight: 700; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    border-top: 4px solid #c98a3a;
    z-index: 20;
  }
  #footer-msg .glow { color: #ffd44a; text-shadow: 0 0 10px #ffa030; }

  /* ---------- 모달 ---------- */
  .modal-back {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 200;
  }
  .modal-back.show { display: flex; }
  .modal {
    background: linear-gradient(180deg,#fff 0%, #fff8e8 100%);
    border: 5px solid #ff8a3d; border-radius: 24px;
    padding: 30px 36px; min-width: 560px; max-width: 720px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
  }
  .modal h2 {
    font-size: 28px; color: #d44a00; margin-bottom: 14px;
    text-align: center;
  }
  .modal .desc { font-size: 16px; color: #555; margin-bottom: 14px; text-align: center; }
  .modal .template {
    background: #fffbe0; border: 3px dashed #ff8a3d;
    border-radius: 14px; padding: 16px; font-size: 18px; line-height: 1.7;
    margin-bottom: 18px;
  }
  .modal .template input {
    border: none; border-bottom: 3px solid #ff8a3d;
    background: transparent; font-size: 18px; font-weight: 700;
    color: #d44a00; padding: 4px 8px; width: 280px;
    text-align: center; font-family: inherit;
  }
  .modal .template input:focus { outline: none; background: #fff; }
  .modal .hint {
    background: #e0f4ff; border-left: 4px solid #3a8aff;
    padding: 10px 14px; border-radius: 8px;
    font-size: 14px; color: #1a4aaf; margin-bottom: 12px;
  }
  .modal-btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }
  .modal-btn {
    padding: 14px 28px; font-size: 18px; font-weight: 800;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: inherit;
  }
  .modal-btn.primary { background: linear-gradient(180deg,#ffb24d,#ff7a1f); color: #fff; box-shadow: 0 4px 0 #c0500e; }
  .modal-btn.primary:hover { transform: translateY(2px); box-shadow: 0 2px 0 #c0500e; }
  .modal-btn.primary:disabled { background: #ccc; box-shadow: 0 4px 0 #999; cursor: not-allowed; }
  .modal-btn.secondary { background: #eee; color: #555; box-shadow: 0 4px 0 #aaa; }

  /* 우체통 모달 */
  .mail-item {
    background: #fff8e8; border: 2px solid #c98a3a;
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .mail-item .from { font-weight: 800; color: #5a3a1a; font-size: 14px; min-width: 90px;}
  .mail-item .reason { flex: 1; font-size: 13px; color: #444; }
  .mail-item .amount {
    background: #ff6a8a; color: #fff; padding: 4px 10px;
    border-radius: 14px; font-weight: 800; font-size: 14px; min-width: 50px; text-align:center;
  }
  .mail-item button {
    background: #ff8a3d; color: #fff; border: none;
    padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer;
  }

  /* 신문 (종료 화면) */
  #end-screen {
    position: absolute; inset: 0;
    background: #2a1a0a;
    display: none; align-items: center; justify-content: center;
    z-index: 300; overflow-y: auto; padding: 20px;
  }
  #end-screen.show { display: flex; }
  .newspaper {
    background: #fdf6e3; width: 90%; max-width: 1200px;
    padding: 30px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 2px solid #5a3a1a;
    font-family: 'Nanum Myeongjo', 'Batang', serif;
    position: relative;
  }
  .newspaper::before, .newspaper::after {
    content: ''; position: absolute; left: 30px; right: 30px;
    height: 4px; background: repeating-linear-gradient(90deg,#5a3a1a 0,#5a3a1a 8px,transparent 8px,transparent 14px);
  }
  .newspaper::before { top: 10px; } .newspaper::after { bottom: 10px; }
  .news-masthead {
    text-align: center; border-bottom: 4px double #5a3a1a;
    padding-bottom: 12px; margin-bottom: 20px;
  }
  .news-title { font-size: 60px; font-weight: 900; color: #2a1a0a; letter-spacing: 4px; }
  .news-subtitle { font-size: 14px; color: #6a4a2a; margin-top: 4px; }
  .news-headline {
    font-size: 36px; font-weight: 900; color: #c0240a;
    text-align: center; margin: 20px 0 26px;
    line-height: 1.3;
  }
  .news-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .news-col { font-size: 14px; line-height: 1.6; color: #2a1a0a; }
  .news-col h3 {
    font-size: 20px; border-bottom: 2px solid #5a3a1a;
    padding-bottom: 4px; margin-bottom: 10px; color: #5a3a1a;
  }
  .news-entry { margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #c98a3a; }
  .news-conclusion {
    grid-column: 1/-1;
    background: #fff8e0; border: 3px dashed #ff8a3d;
    padding: 16px 20px; border-radius: 12px;
    margin-top: 14px;
  }
  .news-conclusion textarea {
    width: 100%; min-height: 70px; font-size: 16px; padding: 10px;
    border: 2px solid #c98a3a; border-radius: 8px; font-family: inherit;
    resize: none;
  }
  .news-actions { text-align: center; margin-top: 16px; }
  .news-actions button {
    margin: 0 6px; padding: 12px 22px; font-size: 16px; font-weight: 800;
    border: none; border-radius: 10px; cursor: pointer;
    background: #ff8a3d; color: #fff; box-shadow: 0 4px 0 #c0500e;
    font-family: 'Malgun Gothic', sans-serif;
  }
  .news-actions button:hover { transform: translateY(2px); box-shadow: 0 2px 0 #c0500e; }

  /* 도움말 */
  .help-content { font-size: 14px; line-height: 1.8; color: #444; }
  .help-content h3 { color: #d44a00; margin-top: 12px; }
  .help-content li { margin-left: 20px; }

  /* 재앙 알림 */
  .disaster-banner {
    position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(90deg,#ff3a3a,#ff8a3a);
    color: #fff; padding: 16px 36px; font-size: 22px; font-weight: 900;
    border-radius: 14px; box-shadow: 0 8px 0 rgba(0,0,0,0.3);
    z-index: 50; animation: bannerIn .5s ease-out;
  }
  @keyframes bannerIn { from { transform: translate(-50%,-50px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }

  #village.shaking { animation: villageshake .1s ease-in-out 6; }
  @keyframes villageshake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(-4px,2px); } 75% { transform: translate(4px,-2px); } }

  /* 점수 변경 알림 */
  .score-popup {
    position: absolute; font-size: 26px; font-weight: 900;
    pointer-events: none; z-index: 60;
    animation: scorePop 1.4s ease-out forwards;
  }
  .score-popup.plus { color: #2aaa3a; }
  .score-popup.minus { color: #ff2a2a; }
  @keyframes scorePop {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-60px); opacity: 0; }
  }

  /* 계절 오버레이 */
  .season-overlay {
    position: absolute; inset: 0; pointer-events: none;
    transition: background 2s; z-index: 1;
  }
  .season-overlay.spring { background: linear-gradient(180deg, rgba(255,200,220,0.15), transparent); }
  .season-overlay.summer { background: linear-gradient(180deg, rgba(255,240,180,0.18), transparent); }
  .season-overlay.fall   { background: linear-gradient(180deg, rgba(255,180,120,0.22), transparent); }
  .season-overlay.winter { background: linear-gradient(180deg, rgba(220,240,255,0.35), transparent); }

  /* 입자 (눈, 꽃잎 등) */
  .particle {
    position: absolute; pointer-events: none;
    font-size: 18px; opacity: 0.8;
  }

  /* 햇살 효과 */
  .sunray {
    position: absolute; transform: translate(-50%,-50%);
    width: 100px; height: 100px; pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,150,0.55), transparent 70%);
    border-radius: 50%; z-index: 1;
    animation: sunpulse 3s ease-in-out infinite;
  }
  @keyframes sunpulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

  /* 토스트 */
  #toast {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px;
    border-radius: 30px; font-weight: 700; font-size: 16px;
    z-index: 100; opacity: 0; transition: opacity .3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="stage">

  <!-- ===== 시작 화면 ===== -->
  <div id="start-screen">
    <div class="teacher-tag">🎓 2학년 3반 이수성 선생님 제작</div>
    <span class="gate-deco gate-cloud" style="top:120px;left:120px;">☁️</span>
    <span class="gate-deco gate-cloud" style="top:80px;right:200px;animation-delay:-3s;">☁️</span>
    <span class="gate-deco gate-tree l">🌳</span>
    <span class="gate-deco gate-tree r">🌳</span>

    <div class="gate">🏘️ 우리 마을 입구</div>
    <div class="subtitle">함께 힘을 합쳐서 마을 주민을 행복하게 만들어 보아요!</div>

    <div class="panel">
      <label>🌟 몇 모둠인가요?</label>
      <input id="team-input" type="text" placeholder="예) 3" maxlength="20"/>
      <div class="row">
        <div>
          <label>🙋 1번 학생 이름</label>
          <input id="name1-input" type="text" placeholder="이름을 적어주세요" maxlength="10"/>
        </div>
        <div>
          <label>🙋 2번 학생 이름</label>
          <input id="name2-input" type="text" placeholder="이름을 적어주세요" maxlength="10"/>
        </div>
      </div>

/* ---------- 헥사 그리드 수학 (Flat-top, offset coords) ---------- */
let HEX_SIZE = 55;  // 시작 후 계산
let GRID_W = 8, GRID_H = 6;
let GRID_OFFSET = {x:0,y:0};
function hexCenter(col,row){
  const x = HEX_SIZE*1.5*col + HEX_SIZE + GRID_OFFSET.x;
  const y = HEX_SIZE*Math.sqrt(3)*(row + (col%2===1?0.5:0)) + HEX_SIZE*Math.sqrt(3)/2 + GRID_OFFSET.y;
  return {x,y};
}
function tileKey(c,r){ return c+","+r; }
function* allTiles(){
  for(let c=0;c<GRID_W;c++) for(let r=0;r<GRID_H;r++) yield [c,r];
}

/* ---------- 타일 종류 ---------- */
// 시드 기반 결정 (동일한 모둠/실행에서 같은 모양)
let SEED = Math.floor(Math.random()*99999);
function rand(c,r,salt=0){
  const x = Math.sin((c*73 + r*131 + SEED + salt)*12.9898)*43758.5453;
  return x - Math.floor(x);
}
const TILE_TYPES = ['flower','grass','grass','grass','asphalt','mountain','stream','weed'];
function tileTypeFor(c,r){
  return TILE_TYPES[Math.floor(rand(c,r,1)*TILE_TYPES.length)];
}

/* ---------- 캔버스 그리기 ---------- */
const canvas = document.getElementById('village-canvas');
const ctx = canvas.getContext('2d');
function fitVillage(){
  const v = document.getElementById('village');
  const w = v.clientWidth, h = v.clientHeight;
  canvas.width = w; canvas.height = h;
  // 그리드 크기 자동 조정
  const sizeW = (w - 20) / ( (GRID_W-1)*1.5 + 2 );
  const sizeH = (h - 20) / ( (GRID_H + 0.5) * Math.sqrt(3) );
  HEX_SIZE = Math.min(sizeW, sizeH, 75);
  const gridW = (GRID_W-1)*HEX_SIZE*1.5 + HEX_SIZE*2;
  const gridH = (GRID_H + 0.5)*HEX_SIZE*Math.sqrt(3);
  GRID_OFFSET.x = (w - gridW)/2;
  GRID_OFFSET.y = (h - gridH)/2;
}

function hexPath(cx,cy,size){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a = Math.PI/3*i;
    const x = cx + size*Math.cos(a);
    const y = cy + size*Math.sin(a);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function drawTile(c,r){
  const {x,y} = hexCenter(c,r);
  const type = tileTypeFor(c,r);
  let fill, stroke='#7a5a2a';
  switch(type){
    case 'flower': fill='#ffd8e8'; break;
    case 'grass':  fill='#9be37a'; break;
    case 'asphalt':fill='#aaaaaa'; break;
    case 'mountain':fill='#c8a87a'; break;
    case 'stream': fill='#8cd5f0'; break;
    case 'weed':   fill='#d0c890'; break;
  }
  // 계절 색조
  const season = currentSeason();
  if(season==='winter') fill = blendColor(fill,'#ffffff',0.45);
  else if(season==='fall') fill = blendColor(fill,'#ff9a40',0.18);
  else if(season==='summer') fill = blendColor(fill,'#ffe080',0.10);

  hexPath(x,y,HEX_SIZE*0.97);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = stroke;
  ctx.stroke();

  // 자연 오브제
  ctx.font = `${HEX_SIZE*0.32}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const r1 = rand(c,r,2), r2 = rand(c,r,3), r3 = rand(c,r,4);
  if(type==='flower'){
    ctx.fillText('🌷', x - HEX_SIZE*0.35, y - HEX_SIZE*0.2);
    ctx.fillText('🦋', x + HEX_SIZE*0.32, y - HEX_SIZE*0.32);
    ctx.fillText('🌼', x + HEX_SIZE*0.1,  y + HEX_SIZE*0.32);
  } else if(type==='grass'){
    if(r1<0.5) ctx.fillText('🌿', x + HEX_SIZE*0.3, y + HEX_SIZE*0.25);
    if(r2<0.5) ctx.fillText('🍀', x - HEX_SIZE*0.32, y + HEX_SIZE*0.1);
  } else if(type==='asphalt'){
    ctx.strokeStyle = '#fff'; ctx.setLineDash([6,6]); ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x-HEX_SIZE*0.6, y); ctx.lineTo(x+HEX_SIZE*0.6, y);
    ctx.stroke();
    ctx.setLineDash([]);
  } else if(type==='mountain'){
    ctx.fillText('⛰️', x - HEX_SIZE*0.25, y - HEX_SIZE*0.15);
    if(r1<0.5) ctx.fillText('🌲', x + HEX_SIZE*0.28, y + HEX_SIZE*0.1);
  } else if(type==='stream'){
    ctx.fillText('💧', x - HEX_SIZE*0.3, y);
    ctx.fillText('🐟', x + HEX_SIZE*0.2, y + HEX_SIZE*0.15);
  } else if(type==='weed'){
    ctx.fillText('🪨', x - HEX_SIZE*0.3, y + HEX_SIZE*0.1);
    if(r1<0.5) ctx.fillText('🌾', x + HEX_SIZE*0.25, y - HEX_SIZE*0.15);
  }

  // 경계: 인접 두 타일 모두 건물 있으면 도보 (자연스러운 길 조성)
}

function blendColor(hex, mix, t){
  function toRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
  const a = toRgb(hex), b = toRgb(mix);
  const r = Math.round(a[0]*(1-t)+b[0]*t);
  const g = Math.round(a[1]*(1-t)+b[1]*t);
  const bl= Math.round(a[2]*(1-t)+b[2]*t);
  return '#'+[r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawAllTiles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const [c,r] of allTiles()) drawTile(c,r);
  drawPaths();
}

// 자주 다니는 경계는 도보 — 건물이 양쪽에 있으면 그림
function drawPaths(){
  ctx.strokeStyle = '#9c7a4a';
  ctx.lineWidth = 4;
  const dirs = [[1,0],[0,1],[-1,1]];
  const drawn = new Set();
  for(const [c,r] of allTiles()){
    if(!G.buildings[tileKey(c,r)]) continue;
    for(const [dc,dr] of [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nc>=GRID_W||nr<0||nr>=GRID_H) continue;
      const k = [c,r,nc,nr].sort().join('|');
      if(drawn.has(k)) continue;
      if(G.buildings[tileKey(nc,nr)]){
        drawn.add(k);
        const a = hexCenter(c,r), b = hexCenter(nc,nr);
        ctx.beginPath();
        ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }
}

function rebuildBuildingSprites(){

      sp.style.opacity = '0.45'; sp.style.filter = 'grayscale(1) drop-shadow(2px 2px 0 rgba(0,0,0,0.3))';
      sp.textContent = info.b.i;
      sp.title = info.b.n + ' (' + (info.disasterType||'위기') + ')';
      village.appendChild(sp);
    } else {
      const sp = document.createElement('div');
      sp.className = 'building-sprite';
      sp.style.left = x+'px'; sp.style.top = y+'px';
      sp.textContent = info.b.i;
      sp.title = info.b.n;

        const ray = document.createElement('div');
        ray.className = 'sunray';
        ray.style.left = x+'px'; ray.style.top = y+'px';
        village.appendChild(ray);
      }
    }
  }
}

/* ---------- 행복 나무 ---------- */
let HAPPY_TREES = []; // {c,r,x,y}
function placeHappyTrees(){
  HAPPY_TREES = [];
  // 마을 모서리 / 빈자리에 5개 배치
  const candidates = [[0,0],[GRID_W-1,0],[0,GRID_H-1],[GRID_W-1,GRID_H-1],[Math.floor(GRID_W/2),Math.floor(GRID_H/2)]];
  for(const [c,r] of candidates){
    const {x,y} = hexCenter(c,r);
    HAPPY_TREES.push({c,r,x,y});
  }
}
function renderHappyTrees(){
  document.querySelectorAll('.happy-tree').forEach(e=>e.remove());
  const village = document.getElementById('village');
  for(const t of HAPPY_TREES){
    if(G.buildings[tileKey(t.c,t.r)]) continue; // 건물 없을 때만
    const el = document.createElement('div');
    el.className = 'happy-tree';
    el.style.left = t.x + 'px'; el.style.top = (t.y - 10) + 'px';
    el.textContent = G.displayedHappiness > 30 ? '🌳' : '🌱';
    // 열매
    const fruits = Math.min(6, Math.floor(G.displayedHappiness/10));
    for(let i=0;i<fruits;i++){
      const f = document.createElement('span');
      f.className = 'heart-fruit';
      const angle = (i/6)*Math.PI*2;
      f.style.left = (Math.cos(angle)*22) + 'px';
      f.style.top = (Math.sin(angle)*22 - 10) + 'px';
      f.textContent = '❤️';
      el.appendChild(f);
    }
    village.appendChild(el);
  }
}
function burstHearts(amount){
  const village = document.getElementById('village');
  for(let i=0;i<Math.min(amount,6);i++){
    const t = HAPPY_TREES[Math.floor(Math.random()*HAPPY_TREES.length)];
    if(!t) continue;
    const el = document.createElement('div');
    el.className = 'heart-burst';
    el.style.left = (t.x + (Math.random()-0.5)*30) + 'px';
    el.style.top = (t.y - 10 + (Math.random()-0.5)*20) + 'px';
    el.textContent = '💖';
    village.appendChild(el);
    setTimeout(()=>el.remove(),1100);

    if(npc.mode==='bike')modeEmoji = s.gender==='girl' ? '🚴‍♀️' : '🚴‍♂️';
    el.innerHTML = `<span class="body">${modeEmoji}</span><span class="label">${s.name}</span>`;

}
function randomVillagePos(){
  const v = document.getElementById('village');
  return { x: 60 + Math.random()*(v.clientWidth-120), y: 60 + Math.random()*(v.clientHeight-120) };
}

function tickNPCs(dt){
  for(const n of G.npcs){
    // 목적지 도착하면 새 목적지
    const dx = n.tx - n.x, dy = n.ty - n.y;
    const dist = Math.hypot(dx,dy);
    if(dist < 4 || n.cooldown<=0){
      n.cooldown = 1.5 + Math.random()*4;
      const p = randomVillagePos();
      n.tx = p.x; n.ty = p.y;
      // 가끔 모드 바꿈
      if(Math.random()<0.15){
        const modes=['walk','run','bike'];
        n.mode = modes[Math.floor(Math.random()*modes.length)];
        const body = n.gender==='girl'
          ? (n.mode==='run'?'🏃‍♀️':(n.mode==='bike'?'🚴‍♀️':'👧'))
          : (n.mode==='run'?'🏃‍♂️':(n.mode==='bike'?'🚴‍♂️':'👦'));
        n.el.querySelector('.body').textContent = body;
        n.el.classList.remove('walking','running');
        n.el.classList.add(n.mode==='walk'?'walking':'running');
      }
    } else {
      // 헥사 한 칸 ~ 3초 기준 (HEX_SIZE 거리에 3초)
      const base = HEX_SIZE / 3.0; // px per sec
      const speed = base * n.speed * (n.mode==='walk'?1:(n.mode==='run'?2.0:2.5));
      const step = speed * dt;
      const nx = n.x + (dx/dist)*step + (Math.random()-0.5)*0.4;
      const ny = n.y + (dy/dist)*step + (Math.random()-0.5)*0.4;
      n.x = nx; n.y = ny;
      n.el.style.left = nx+'px'; n.el.style.top = ny+'px';
    }
    n.cooldown -= dt;
    n.talkTimer -= dt;
  }
  // 만남: 가까운 NPC들끼리 인사
  for(let i=0;i<G.npcs.length;i++){
    for(let j=i+1;j<G.npcs.length;j++){
      const a = G.npcs[i], b = G.npcs[j];
      if(a.talkTimer>0 || b.talkTimer>0) continue;
      if(Math.hypot(a.x-b.x,a.y-b.y)<40 && Math.random()<0.04){
        const line = HELLO_LINES[Math.floor(Math.random()*HELLO_LINES.length)];
        showSpeech(a, line, 3000);
        showSpeech(b, HELLO_LINES[Math.floor(Math.random()*HELLO_LINES.length)], 3000);
        a.talkTimer = 4; b.talkTimer = 4;
      }
    }
  }
}

function showSpeech(npc, text, dur=2500){
  // 기존 말풍선 제거
  const old = npc.el.querySelector('.speech');
  if(old) old.remove();
  const s = document.createElement('div');
  s.className = 'speech';
  s.textContent = text;
  npc.el.appendChild(s);
  setTimeout(()=>{ if(s.parentNode) s.remove(); }, dur);
}

/* ---------- 사운드 (Web Audio 간단 톤) ---------- */
let audioCtx;
function playTone(freq, dur=0.2, type='sine', vol=0.1){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function buildingSound(b){
  const n = b.n;
  if(n.includes('초등학교')||n.includes('중학교')){ playTone(800,0.15); setTimeout(()=>playTone(1000,0.15),160); }
  else if(n.includes('마트')||n.includes('백화점')||n.includes('편의점')||n==='CU'||n==='세븐일레븐'){ playTone(900,0.1); setTimeout(()=>showToast('🛒 어서오세요!'),50); }
  else if(n.includes('소방서')){ playTone(900,0.15,'square'); setTimeout(()=>playTone(600,0.15,'square'),160); }
  else if(n.includes('경찰')){ playTone(750,0.2,'sawtooth'); }
  else if(n.includes('병원')||n.includes('약국')||n.includes('치과')||n.includes('이비인후')){ playTone(550,0.1); }
  else if(n.includes('교회')){ playTone(440,0.3); setTimeout(()=>playTone(330,0.3),200); }
  else { playTone(700,0.15); }
}

function onBuildingClick(key){
  const info = G.buildings[key];
  if(!info || info.constructing) return;
  if(info.broken){ onDisasterClick(key); return; }
  buildingSound(info.b);
  // 가까운 NPC 한 명 말풍선
  const {x,y} = hexCenter(...key.split(',').map(Number));
  let nearest=null, nd=1e9;
  for(const n of G.npcs){
    const d = Math.hypot(n.x-x,n.y-y);
    if(d<nd){ nd=d; nearest=n; }
  }
  if(nearest){
    const lines = info.b.lines || KID_LINES;
    showSpeech(nearest, lines[Math.floor(Math.random()*lines.length)], 3500);
  }
}

function changeHappiness(delta, x, y){

    const pop = document.createElement('div');
    pop.className = 'score-popup ' + (delta>=0?'plus':'minus');

    document.getElementById('village').appendChild(pop);

  renderHappyTrees();
}

/* ---------- 드래그 배치 ---------- */
let dragging = false, dragX=0, dragY=0;
const dragPreview = document.getElementById('drag-preview');
const village = document.getElementById('village');

function enableDragPlacement(){
  if(!placingBuilding) return;
  dragPreview.style.display = 'block';
  dragPreview.textContent = placingBuilding.b.i;
  dragging = true;
  highlightAvailableTiles();
}

function highlightAvailableTiles(){
  drawAllTiles();
  // 빈 타일에 빛나는 효과
  for(const [c,r] of allTiles()){
    if(G.buildings[tileKey(c,r)]) continue;
    if(HAPPY_TREES.some(t=>t.c===c && t.r===r)) continue;
    const {x,y} = hexCenter(c,r);
    ctx.save();
    hexPath(x,y,HEX_SIZE*0.94);
    ctx.fillStyle = 'rgba(255,255,160,0.45)';
    ctx.fill();
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 3;
    ctx.setLineDash([6,4]);
    ctx.stroke();
    ctx.restore();
  }
  ctx.setLineDash([]);
}

document.addEventListener('mousemove',(e)=>{
  if(!dragging) return;
  const rect = village.getBoundingClientRect();
  // stage transform 보정 필요
  const scale = stageScale();
  const x = (e.clientX - rect.left)/scale;
  const y = (e.clientY - rect.top)/scale;
  dragPreview.style.left = (x - 30) + 'px';
  dragPreview.style.top = (y - 45) + 'px';
  // village 위치 보정
  dragPreview.style.transform = 'none';
  // 절대 좌표는 stage 기준
  dragX = x; dragY = y;
});

village.addEventListener('click',(e)=>{
  if(!dragging || !placingBuilding) return;
  const rect = village.getBoundingClientRect();
  const scale = stageScale();
  const x = (e.clientX - rect.left)/scale;
  const y = (e.clientY - rect.top)/scale;
  const t = pickTile(x,y);
  if(!t){ return; }
  const k = tileKey(t.c,t.r);
  if(G.buildings[k]){ showToast('이미 건물이 있어요!'); return; }
  if(HAPPY_TREES.some(h=>h.c===t.c && h.r===t.r)){ showToast('여기는 행복 나무가 있어요!'); return; }
  placeBuildingAt(t.c, t.r);
});

function stageScale(){
  const s = document.getElementById('stage');
  const tr = s.style.transform;
  const m = tr.match(/scale\(([\d.]+)\)/);
  return m? parseFloat(m[1]) : 1;
}

function pickTile(px,py){
  let best=null, bd=1e9;
  for(const [c,r] of allTiles()){
    const {x,y} = hexCenter(c,r);
    const d = Math.hypot(x-px,y-py);
    if(d < HEX_SIZE*0.95 && d<bd){ bd=d; best={c,r}; }
  }
  return best;
}

function placeBuildingAt(c,r){
  const k = tileKey(c,r);
  const b = placingBuilding.b;
  G.buildings[k] = { b, name:b.n, value:b.v, constructing:true };
  dragging = false;
  dragPreview.style.display = 'none';
  placingBuilding = null;
  drawAllTiles();
  rebuildBuildingSprites();
  renderHappyTrees();
  // 망치질 소리
  for(let i=0;i<3;i++) setTimeout(()=>playTone(220,0.06,'square',0.07), i*200);
  setTimeout(()=>{
    G.buildings[k].constructing = false;
    rebuildBuildingSprites();
    drawAllTiles();
    const ctr = hexCenter(c,r);
    changeHappiness(b.v, ctr.x, ctr.y);
    playTone(880,0.15); setTimeout(()=>playTone(1100,0.15),120);
    showToast(`✨ ${b.n} 완성! +${b.v} 행복도`);
    advanceTurn();
  }, 1200);
}

    msg:b=>`미세먼지가 너무 높아서 ${b.n}에서 놀 수 없어요!` },
  { key:'road',  name:'도로 공사', emoji:'🚜', match:b=>b.n.includes('차돌')||b.n.includes('돼지')||b.n.includes('파리바게트')||b.n.includes('호두'),
    msg:b=>`${b.n} 앞 도로 밑에 물이 새서 공사를 시작했어요!` },
  { key:'virus', name:'반짝반짝 소독 중', emoji:'🧼', match:b=>b.n.includes('학교')||b.n.includes('어린이집')||b.n.includes('유치원'),
    msg:b=>`${b.n}을(를) 깨끗이 소독하고 있어요. 끝날 때까지 기다려요!` },
];

function triggerDisaster(){
  const builtKeys = Object.keys(G.buildings).filter(k=>!G.buildings[k].constructing && !G.buildings[k].broken);
  if(builtKeys.length===0) return;
  // 매칭 가능한 재앙 우선, 없으면 일반
  let chosen = null;
  for(const d of [...DISASTERS].sort(()=>Math.random()-0.5)){
    const matched = builtKeys.filter(k=>d.match(G.buildings[k].b));
    if(matched.length>0){
      chosen = { d, key: matched[Math.floor(Math.random()*matched.length)] };
      break;
    }
  }
  if(!chosen){
    // 아무거나 골라서 일반 재앙
    const d = DISASTERS[Math.floor(Math.random()*DISASTERS.length)];
    chosen = { d, key: builtKeys[Math.floor(Math.random()*builtKeys.length)] };
  }
  const info = G.buildings[chosen.key];
  info.broken = true;
  info.disasterType = chosen.d.name;
  info.disasterMsg = chosen.d.msg(info.b);
  // 흔들기
  village.classList.add('shaking');
  setTimeout(()=>village.classList.remove('shaking'),700);
  // 행복도 깎기
  const [c,r] = chosen.key.split(',').map(Number);
  const {x,y} = hexCenter(c,r);
  changeHappiness(-info.value, x, y);
  // 배너
  const banner = document.createElement('div');
  banner.className = 'disaster-banner';
  banner.innerHTML = `${chosen.d.emoji} ${chosen.d.name}! ${info.b.n}이(가) 위험해요!`;
  village.appendChild(banner);
  setTimeout(()=>banner.remove(),3500);
  rebuildBuildingSprites();
  playTone(200,0.4,'sawtooth',0.15);
  showToast('❗ SOS! 시설을 살려주세요. 건물을 눌러 복구 미션!', 3500);
}

function onDisasterClick(key){
  const info = G.buildings[key];
  if(!info.broken) return;
  const playerName = G.players[G.curPlayerIdx];
  const html = `
    <h2>🚨 ${info.b.n} 복구 미션</h2>
    <div class="desc">${info.disasterMsg}</div>
    <div class="hint">💡 이 시설이 없으면 어떤 일이 생길까요?</div>
    <div class="template">
      <b style="color:#d44a00">${info.b.n}</b>은(는) 소중합니다.<br>
      왜냐하면 <input id="reason-input" placeholder="예) 우리 마을 사람들을 도와주기" />때문입니다.
    </div>
    <div class="modal-btn-row">
      <button class="modal-btn secondary" id="cancel-btn">나중에</button>
      <button class="modal-btn primary" id="submit-btn" disabled>📮 답변 제출하기</button>
    </div>
  `;
  openModal(html);
  const ri = document.getElementById('reason-input');
  const sb = document.getElementById('submit-btn');
  ri.focus();
  ri.addEventListener('input',()=>{ sb.disabled = !ri.value.trim(); });
  document.getElementById('cancel-btn').addEventListener('click',closeModal);
  sb.addEventListener('click',()=>{
    const reason = ri.value.trim(); if(!reason) return;
    const sentence = `${info.b.n}은(는) 소중합니다. 왜냐하면 ${reason}때문입니다.`;
    G.newspaperEntries.push({
      turn: G.turn,
      player: playerName,
      action: '복구',
      building: info.b.n,
      sentence
    });
    closeModal();
    info.broken = false; info.disasterType = null;
    const [c,r] = key.split(',').map(Number);
    const ctr = hexCenter(c,r);
    changeHappiness(info.value, ctr.x, ctr.y);
    rebuildBuildingSprites();
    playTone(700,0.2); setTimeout(()=>playTone(1100,0.2),200);
    showToast(`💚 ${info.b.n} 복구 완료! +${info.value}💖`);
  });
}

/* ---------- 시간 진행 ---------- */
function tickTime(now){
  if(G.ended || G.paused) return;
  const elapsed = now - G.startTime;
  const progress = Math.min(1, elapsed / G.totalMs);
  const days = Math.floor(progress * 365);
  const d = new Date(2026,0,1);
  d.setDate(d.getDate() + days);
  G.date = d;
  if(progress >= 1){ endGame(); return; }
}

/* ---------- 입자 효과 (계절) ---------- */
let particles = [];
function spawnSeasonalParticles(){
  const s = currentSeason();
  if(Math.random() > 0.05) return; // 자주 안 만듦
  const v = document.getElementById('village');
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random()*v.clientWidth + 'px';
  p.style.top = '-20px';
  p.textContent = s==='winter'?'❄️': s==='spring'?'🌸': s==='fall'?'🍂':'✨';
  v.appendChild(p);
  particles.push({el:p, y:-20, x:parseFloat(p.style.left), vy:0.5+Math.random()*1.2, vx:(Math.random()-0.5)*1.5});
}
function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.y += p.vy; p.x += p.vx;
    p.el.style.top = p.y + 'px';
    p.el.style.left = p.x + 'px';
    if(p.y > village.clientHeight){
      p.el.remove();
      particles.splice(i,1);
    }
  }
}

/* ---------- 메인 루프 ---------- */
let lastT = 0;
function loop(t){
  if(!lastT) lastT = t;
  const dt = Math.min(0.1,(t - lastT)/1000);
  lastT = t;
  if(!G.ended){
    tickTime(t);
    tickNPCs(dt);
    spawnSeasonalParticles();
    tickParticles();
    updateHud();
  }
  requestAnimationFrame(loop);
}

/* ---------- 종료 / 신문 ---------- */
function endGame(){
  G.ended = true;
  // 신문 만들기
  const constructEntries = G.newspaperEntries.filter(e=>e.action==='건설');
  const recoverEntries   = G.newspaperEntries.filter(e=>e.action==='복구');
  const html = `
    <div class="news-masthead">
      <div class="news-title">우리 마을 신문</div>
      <div class="news-subtitle">2026. 12. 31 · 2학년 3반 ${G.team}모둠 발행 · 발행인: ${G.players.join(', ')} · 제작: 이수성 선생님</div>
    </div>
    <div class="news-headline">🎉 2학년 3반 ${G.team}모둠, 주민 행복도 ${G.happiness}점 달성! 🎉</div>
    <div class="news-cols">
      <div class="news-col">
        <h3>🏗️ 우리가 지은 건물 (${constructEntries.length}개)</h3>
        ${constructEntries.map(e=>`
          <div class="news-entry">
            <b>${e.building}</b> · ${e.player}<br>
            <small>"${e.sentence}"</small>
          </div>
        `).join('') || '<p>지은 건물이 없어요.</p>'}
      </div>
      <div class="news-col">
        <h3>🚨 우리가 살린 시설 (${recoverEntries.length}개)</h3>
        ${recoverEntries.map(e=>`
          <div class="news-entry">
            <b>${e.building}</b> · ${e.player}<br>
            <small>"${e.sentence}"</small>
          </div>
        `).join('') || '<p>복구한 시설이 없어요.</p>'}
      </div>
      <div class="news-conclusion">
        <b>📝 최종 발표 미션</b><br>
        <p>우리 마을을 구성하는 시설은 중요합니다. 왜냐하면</p>
        <textarea id="final-answer" placeholder="여기에 친구들과 토의해서 답을 적어보세요."></textarea>
        <p>때문입니다.</p>
      </div>
    </div>
    <div class="news-actions">
      <button id="save-btn">💾 신문 저장하기</button>
      <button id="print-btn">🖨️ 인쇄하기</button>
      <button id="restart-btn">🔄 다시 시작</button>
    </div>
  `;
  document.getElementById('newspaper-content').innerHTML = html;
  document.getElementById('end-screen').classList.add('show');
  document.getElementById('save-btn').addEventListener('click',saveNewspaper);
  document.getElementById('print-btn').addEventListener('click',()=>window.print());
  document.getElementById('restart-btn').addEventListener('click',()=>location.reload());
}

function saveNewspaper(){
  const np = document.querySelector('.newspaper');
  // 간단한 HTML 다운로드
  const finalAns = document.getElementById('final-answer').value;
  const blob = new Blob([`<!DOCTYPE html><html><head><meta charset="utf-8"><title>우리 마을 신문</title></head><body>${np.innerHTML.replace('<textarea id="final-answer"',`<div style="border:2px solid #999;padding:10px;border-radius:6px;background:#fff">${finalAns||'(빈칸)'}</div><textarea style="display:none"`)}</body></html>`], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `우리마을신문_${G.team}모둠.html`;
  a.click();
  showToast('💾 신문이 저장되었어요!');
}

/* ---------- 무대 자동 스케일 (16:9) ---------- */
function resizeStage(){
  const stage = document.getElementById('stage');
  const sw = window.innerWidth, sh = window.innerHeight;
  const scaleW = sw / 1600, scaleH = sh / 900;
  const scale = Math.min(scaleW, scaleH);
  stage.style.transform = `translate(-50%,-50%) scale(${scale})`;
}
window.addEventListener('resize',()=>{
  resizeStage();
  if(document.getElementById('play-screen').classList.contains('active')){
    fitVillage();
    drawAllTiles();
    rebuildBuildingSprites();
    renderHappyTrees();
  }
});
resizeStage();

/* ---------- 플레이 초기화 ---------- */
function initPlay(){
  renderPanels();
  fitVillage();
  placeHappyTrees();
  drawAllTiles();
  renderHappyTrees();
  spawnNPCs();
  rebuildBuildingSprites();
  G.startTime = performance.now();
  G.turn = 1;
  G.curPlayerIdx = 0;
  updateHud();
  showToast(`🎉 시작! 1번 ${G.players[0]} 친구부터 시작해요!`, 3500);
  requestAnimationFrame(loop);
}
